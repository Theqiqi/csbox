name: Build and Release Test (Presets Mode)

on:
  push:
    #branches: [ feat/gh-actions ] # 仅在此分支测试
    tags:
      - 'v*' # 当推送以 v 开头的标签时触发
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 1. 自动安装 Ninja (你的 Preset 指定了 Ninja)
      - name: Setup Ninja
        uses: ashutoshvarma/setup-ninja@master

      # 2. 设置 MSVC 环境 (必须指定 x86)
      - name: Setup MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      # 3. 准备 vcpkg
      - name: Setup vcpkg
        run: |
          if (!(Test-Path "vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git
          }
          .\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $GITHUB_ENV

      # 4. 使用你的 Preset 进行 Configure
      # 对应你的 configurePresets[4]: msvc-release-x86
      - name: Configure CMake via Preset
        run: |
          cmake --preset msvc-release-x86

      # 5. 使用你的 Preset 进行 Build
      - name: Build via Preset
        run: cmake --build --preset release-x86

      # 6. 【修复路径】上传到网页附件
      - name: Upload Test Binary
        uses: actions/upload-artifact@v4
        with:
          name: csbox-x86-static
          # 核心修改：改为你日志中显示的实际路径
          path: bin/csbox.exe
          retention-days: 1

      # 7. 【正式发布】只有推 v* 标签时才会执行
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/csbox.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}